# =============================================================================
# Hugo Site Configuration — blog.moebius01.cc
# Custom "Nebula" theme — fully self-contained in layouts/ and static/
# =============================================================================
baseURL = "https://blog.moebius01.cc/"
locale = "en-us"
title = "Mian Budulla"

enableRobotsTXT = true
enableEmoji = true
enableGitInfo = false
summaryLength = 30
buildDrafts = false
buildFuture = false
buildExpired = false

[pagination]
  pagerSize = 10

[outputs]
  home    = ["HTML", "RSS"]
  section = ["HTML", "RSS"]

[taxonomies]
  category = "categories"
  tag      = "tags"
  series   = "series"

[markup]
  [markup.goldmark.renderer]
    unsafe = true
  [markup.highlight]
    noClasses  = false
    codeFences = true
    guessSyntax = true
    lineNos    = false
    style      = "github-dark"
  [markup.tableOfContents]
    startLevel = 2
    endLevel   = 4
    ordered    = false

# =============================================================================
# Site Parameters
# =============================================================================
[params]
  description = "Polymath engineer — fullstack, infrastructure, AI, security, IT ops."

  [params.author]
    name     = "Mian Budulla"
    handle   = "akhlaaqbadulla"
    tagline  = "Polymath engineer · fullstack, infra, AI, security, IT ops"
    avatar   = "/images/avatar.jpg"
    github   = "https://github.com/akhlaaqbadulla"
    linkedin = "https://www.linkedin.com/in/budulla-akhlaaq/"
    email    = "mianbudulla@protonmail.com"
    bio      = "Fullstack developer, infrastructure designer, AI builder, IT generalist. 9+ years across hybrid cloud, on-prem, security hardening, internal tooling, and procurement."
