<!DOCTYPE html>
<html lang="{{ .Site.Language.Locale | default "en" }}">
<head>
  {{- partial "head.html" . -}}
</head>
<body{{ if .IsHome }} data-page="home"{{ end }}>
  {{ if .IsHome }}<canvas class="nb-particles" aria-hidden="true"></canvas>{{ end }}
  {{- partial "header.html" . -}}
  <main class="nb-main">
    <div class="nb-container">
      {{- block "main" . }}{{ end -}}
    </div>
  </main>
  {{- partial "footer.html" . -}}
  {{ if .IsHome }}<script defer src="{{ "/js/particles.js" | relURL }}"></script>{{ end }}
</body>
</html>
